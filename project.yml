name: NotionDashboardSwift
options:
  minimumXcodeGenVersion: 2.45.0
  xcodeVersion: "15.4"
  projectFormat: xcode15_3
settings:
  base:
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    SPARKLE_PUBLIC_ED_KEY: ""
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
targets:
  NotionDashboard-iOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    info:
      path: Config/iOS-Info.plist
      properties:
        CFBundleDisplayName: Dashboard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: notiondashboard.oauth
            CFBundleURLSchemes:
              - com.googleusercontent.apps.608348086080-dp8647muci5st4em00pdgvrba75jq3db
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
    settings:
      base:
        PRODUCT_NAME: Dashboard
        PRODUCT_BUNDLE_IDENTIFIER: com.loldashboard.notiondashboard.ios
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
  NotionDashboard-macOS:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    dependencies:
      - package: Sparkle
        product: Sparkle
    sources:
      - path: Sources
    info:
      path: Config/macOS-Info.plist
      properties:
        CFBundleDisplayName: Dashboard
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleURLTypes:
          - CFBundleURLName: notiondashboard.oauth
            CFBundleURLSchemes:
              - com.googleusercontent.apps.608348086080-dp8647muci5st4em00pdgvrba75jq3db
        LSMinimumSystemVersion: "13.0"
        UpdateChannel: dev
        SUEnableAutomaticChecks: true
        SUAllowsAutomaticUpdates: true
        SUAutomaticallyUpdate: false
        SUScheduledCheckInterval: 3600
        SUFeedURL: https://ludovicstvys.github.io/NotionDashboardSwift/appcast.xml
        SUPublicEDKey: $(SPARKLE_PUBLIC_ED_KEY)
        SURequireSignedFeed: true
    settings:
      base:
        PRODUCT_NAME: Dashboard
        PRODUCT_BUNDLE_IDENTIFIER: com.loldashboard.notiondashboard.macos
        CODE_SIGN_STYLE: Automatic
        OTHER_LDFLAGS: $(inherited) -weak_framework AppIntents
