name: Stable Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 1.2.0)'
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-14
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      build: ${{ steps.metadata.outputs.build }}
      tag: ${{ steps.metadata.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release configuration bundle
        env:
          MACOS_RELEASE_CONFIG_BASE64: ${{ secrets.MACOS_RELEASE_CONFIG_BASE64 }}
        run: |
          [[ -n "${MACOS_RELEASE_CONFIG_BASE64}" ]] || { echo "::error::Missing MACOS_RELEASE_CONFIG_BASE64 secret"; exit 1; }

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Determine marketing version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            ref="${GITHUB_REF##*/}"
            echo "value=${ref#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore prior stable DMGs for delta generation
        uses: actions/cache@v4
        with:
          path: /tmp/NotionDashboardPriorReleases
          key: prior-releases-stable-${{ github.run_id }}
          restore-keys: |
            prior-releases-stable-

      - name: Build, sign, notarize, and generate appcast
        env:
          CURRENT_PROJECT_VERSION_OVERRIDE: ${{ github.run_number }}
          MARKETING_VERSION_OVERRIDE: ${{ steps.version.outputs.value }}
          DERIVED_DATA_PATH: /tmp/NotionDashboardDerivedData
          APP_PRODUCT_NAME: Dashboard
          PRESERVE_BUILD_LOG: "1"
          UPDATE_CHANNEL: stable
          PRIOR_RELEASES_DIR: /tmp/NotionDashboardPriorReleases
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPOSITORY: ${{ github.repository }}
          MACOS_RELEASE_CONFIG_BASE64: ${{ secrets.MACOS_RELEASE_CONFIG_BASE64 }}
        run: ./packaging/release-macos-update.sh

      - name: Copy fresh DMG into prior-releases cache (keep last 5)
        run: |
          mkdir -p /tmp/NotionDashboardPriorReleases
          find build/release-assets -maxdepth 1 -name 'Dashboard-*.dmg' -exec cp {} /tmp/NotionDashboardPriorReleases/ \;
          ls -1t /tmp/NotionDashboardPriorReleases/Dashboard-*.dmg 2>/dev/null | tail -n +6 | xargs -r rm -f

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-dmg-logs-stable
          path: /tmp/notion-dashboard-build.*.log
          if-no-files-found: ignore

      - name: Read build metadata
        id: metadata
        run: |
          cat build/release-metadata.env >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: Dashboard ${{ steps.metadata.outputs.version }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: ${{ steps.metadata.outputs.release_assets_dir }}/${{ steps.metadata.outputs.asset_name }}
          fail_on_unmatched_files: true

      # Stable workflow does NOT auto-deploy Pages to avoid stomping the dev appcast.xml.
      # The appcast-stable.xml lives at build/update-site; merge into the Pages branch manually
      # or via a follow-up workflow that fetches the live appcast.xml and combines both files
      # before deploying.
      - name: Upload appcast-stable artifact
        uses: actions/upload-artifact@v4
        with:
          name: appcast-stable
          path: build/update-site
