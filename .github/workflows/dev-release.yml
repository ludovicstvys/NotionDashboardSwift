name: Dev Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dev-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: macos-14
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      build: ${{ steps.metadata.outputs.build }}
      tag: ${{ steps.metadata.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release configuration bundle
        env:
          MACOS_RELEASE_CONFIG_BASE64: ${{ secrets.MACOS_RELEASE_CONFIG_BASE64 }}
        run: |
          [[ -n "${MACOS_RELEASE_CONFIG_BASE64}" ]] || { echo "::error::Missing MACOS_RELEASE_CONFIG_BASE64 secret"; exit 1; }

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Build, sign, notarize, and generate appcast
        env:
          CURRENT_PROJECT_VERSION_OVERRIDE: ${{ github.run_number }}
          DERIVED_DATA_PATH: /tmp/NotionDashboardDerivedData
          APP_PRODUCT_NAME: Dashboard
          PRESERVE_BUILD_LOG: "1"
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPOSITORY: ${{ github.repository }}
          MACOS_RELEASE_CONFIG_BASE64: ${{ secrets.MACOS_RELEASE_CONFIG_BASE64 }}
        run: ./packaging/release-macos-update.sh

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-dmg-logs
          path: /tmp/notion-dashboard-build.*.log
          if-no-files-found: ignore

      - name: Read build metadata
        id: metadata
        run: |
          cat build/release-metadata.env >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: Dev build ${{ steps.metadata.outputs.version }} (${{ steps.metadata.outputs.build }})
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: ${{ steps.metadata.outputs.release_assets_dir }}/${{ steps.metadata.outputs.asset_name }}
          fail_on_unmatched_files: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.metadata.outputs.update_site_dir }}

  deploy-pages:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
